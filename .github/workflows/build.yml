name: Build and publish Android package

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Android version name and release tag suffix
        required: true
        default: '1.18'
        type: string
      version_code:
        description: Android numeric version code
        required: true
        default: '1'
        type: string
      release_title:
        description: GitHub Release title
        required: true
        default: Source Engine Android
        type: string
      release_body:
        description: GitHub Release notes
        required: true
        default: Automated Android release build.
        type: string
      prerelease:
        description: Mark this release as a pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.metadata.outputs.version_name }}

    steps:
    - uses: actions/checkout@v4
    - name: Resolve build metadata
      id: metadata
      shell: bash
      env:
        INPUT_VERSION_NAME: ${{ inputs.version_name }}
        INPUT_VERSION_CODE: ${{ inputs.version_code }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        version_name="$INPUT_VERSION_NAME"
        version_code="$INPUT_VERSION_CODE"
        if [[ -z "$version_name" && "$REF_NAME" == v* ]]; then
          version_name="${REF_NAME#v}"
        fi
        : "${version_name:=1.18}"
        : "${version_code:=1}"
        if [[ ! "$version_code" =~ ^[0-9]+$ ]]; then
          echo "version_code must be numeric" >&2
          exit 1
        fi
        if [[ ! "$version_name" =~ ^[0-9]+([.][0-9]+)*$ ]]; then
          echo "version_name must contain only numbers and dots" >&2
          exit 1
        fi
        echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
        echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
        echo "Building version $version_name ($version_code)"
    - name: Build
      env:
        VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
        VERSION_CODE: ${{ steps.metadata.outputs.version_code }}
        DEPLOY_BRANCH: srceng-old-port
        COMMIT: ${{ github.sha }}
      run: |
        sudo apt-get update
        sudo apt install -y make openjdk-17-jdk openjdk-17-jre python3-requests python3-pip
        python3 -m pip install --user websocket-client
        git clone --depth 1 https://gitlab.com/LostGamer/ndk-binaries
        git clone --depth 1 https://github.com/nillerusr/srcsdk
        cd srcsdk
        git submodule init && git submodule update
        cd ../
        # Keep build.gradle.kts unchanged in the repository. This replacement
        # only affects the disposable GitHub runner workspace.
        sed -i -E \
          "s/versionCode = [0-9]+/versionCode = ${VERSION_CODE}/; s/versionName = \"[^\"]+\"/versionName = \"${VERSION_NAME}\"/" \
          build.gradle.kts
        scripts/workflow.sh
    - name: Rename APK
      shell: bash
      env:
        VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
      run: cp bin/srceng-release.apk "bin/srceng-android-${VERSION_NAME}.apk"
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: srceng-android-${{ steps.metadata.outputs.version_name }}
        path: bin/srceng-android-${{ steps.metadata.outputs.version_name }}.apk
        if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - name: Download APK artifact
      uses: actions/download-artifact@v4
      with:
        name: srceng-android-${{ needs.build.outputs.version_name }}
        path: release
    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.build.outputs.version_name }}
        name: ${{ inputs.release_title || format('Source Engine Android {0}', needs.build.outputs.version_name) }}
        body: ${{ inputs.release_body || 'Automated Android release build.' }}
        prerelease: ${{ inputs.prerelease || false }}
        files: release/srceng-android-${{ needs.build.outputs.version_name }}.apk
